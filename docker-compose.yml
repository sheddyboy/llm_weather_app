# Deployment stack for the Weather App backend (ARCHITECTURE §10): the FastAPI
# API, Postgres for persistence, and Redis for the deployment cache backend.
#
# The API reads its secrets (API keys) from apps/api/.env if present; the
# infrastructure-specific settings below override that file so the app points at
# the Postgres and Redis services rather than localhost. Start everything with:
#
#     docker compose up --build
#
# then visit http://localhost:8000/docs.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-weatherapp}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./apps/api
    # Per-key API secrets come from this file if it exists; not required so the
    # stack still boots (external integrations degrade) without local secrets.
    env_file:
      - path: ./apps/api/.env
        required: false
    environment:
      # Point the app at the compose services instead of localhost.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-weatherapp}
      CACHE_BACKEND: redis
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Apply migrations before serving, so a fresh database is brought up to head.
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:
